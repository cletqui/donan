# -- Site Configuration --
# https://jpanther.github.io/congo/docs/configuration/#site-configuration

# baseURL = "https://your_domain.com/"
defaultContentLanguage = "fr"
enableRobotsTXT = true

[pagination]
  pagerSize = 10

summaryLength = 0

[outputs]
  home = ["HTML", "RSS", "JSON"]

[privacy]
  [privacy.vimeo]
    enableDNT = true
  [privacy.x]
    enableDNT = true
  [privacy.youTube]
    privacyEnhanced = true

[services]
  [services.x]
    disableInlineCSS = true
